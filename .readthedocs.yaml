version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  commands:
    - asdf plugin add uv
    - asdf install uv latest
    - asdf global uv latest
    - uv sync --group docs --extra workspace --frozen
    - uv run nox -s docs
    - mkdir -p "$READTHEDOCS_OUTPUT/html"
    - cp -a _build/html/. "$READTHEDOCS_OUTPUT/html/"

formats: []
