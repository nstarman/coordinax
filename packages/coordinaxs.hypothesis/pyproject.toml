[project]
authors = [
  { name = "Coordinax Devs", email = "nstarman@users.noreply.github.com" },
  { name = "Nathaniel Starkman", email = "nstarman@users.noreply.github.com" },
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "Intended Audience :: Developers",
  "Operating System :: OS Independent",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Scientific/Engineering",
  "Typing :: Typed",
]
dependencies = ["coordinax", "hypothesis>=6.0", "unxt-hypothesis>=1.10.1"]
description = "Hypothesis strategies for coordinax"
dynamic = ["version"]
license = "MIT"
name = "coordinaxs.hypothesis"
readme = "README.md"
requires-python = ">=3.11"

[build-system]
build-backend = "hatchling.build"
requires      = ["hatch-vcs", "hatchling"]

[tool.hatch.version]
source = "vcs"

[tool.hatch.version.raw-options]
local_scheme              = "no-local-version"
root                      = "../.."
search_parent_directories = true

[tool.hatch.version.raw-options.scm.git]
describe_command = [
  "git",
  "describe",
  "--dirty",
  "--tags",
  "--long",
  "--match",
  "coordinaxs-hypothesis-v*",
]

[tool.hatch.build.hooks.vcs]
version-file = "src/coordinaxs/hypothesis/_version.py"
version-file-template = """\
version: str = {version!r}
version_tuple: tuple[int, int, int] | tuple[int, int, int, str, str]
version_tuple = {version_tuple!r}
"""

[tool.hatch.build.targets.wheel]
packages = ["src/coordinaxs"]

[tool.ruff]
extend = "../../pyproject.toml"

[tool.ruff.lint]
# Pre-existing lint debt, surfaced now that this package inherits the root
# ruff config (previously it shadowed the root and silently ran ruff's
# default rule set, so the root's import-convention aliases were never
# enforced here). Ignored to keep this packaging change reviewable;
# TODO: burn these down in a follow-up.
ignore = [
  "ANN002",
  "ANN201",
  "ANN202",
  "ANN206",
  "D102",
  "D205",
  "D400",
  "D415",
  "D417",
  "E501",
  "FBT001",
  "FBT003",
  "INP001",
  "S101",
  "SIM103",
]

[tool.ruff.lint.isort]
combine-as-imports = true
known-first-party  = ["coordinax"]
known-local-folder = ["coordinaxs.hypothesis"]

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F403"]

[tool.uv.sources]
coordinax = { workspace = true }
