[project]
authors = [
  { name = "Coordinax Devs", email = "nstarman@users.noreply.github.com" },
  { name = "Nathaniel Starkman", email = "nstarman@users.noreply.github.com" },
  { name = "Adrian Price-Whelan", email = "adrn@users.noreply.github.com" },
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "Intended Audience :: Developers",
  "Operating System :: OS Independent",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Scientific/Engineering",
  "Typing :: Typed",
]
dependencies = ["coordinax>=0.24", "optional-dependencies>=0.4.0"]
description = "Astronomy-specific reference frames for coordinax"
dynamic = ["version"]
license = "MIT"
name = "coordinaxs.astro"
readme = "README.md"
requires-python = ">=3.12"

[project.optional-dependencies]
astropy = ["astropy>=7.2.0"]
# This distribution also ships the `coordinaxs.hypothesis.astro` strategy tree,
# which imports `hypothesis`, `unxt_hypothesis`, and `coordinaxs.hypothesis`.
# Those are not needed to `import coordinaxs.astro`, so they are declared here
# rather than as hard dependencies:
#   pip install "coordinaxs.astro[hypothesis]"
hypothesis = [
  "coordinaxs.hypothesis>=0.24",
  "hypothesis>=6.148.7",
  "unxt-hypothesis>=1.10.1",
]

[project.entry-points."coordinaxs.frames"]
astro = "coordinaxs.astro._setup_package:coordinaxs_frames_exports"


[build-system]
build-backend = "hatchling.build"
requires      = ["hatch-vcs", "hatchling"]


[tool.hatch.build.targets.wheel]
packages = ["src/coordinaxs"]

[tool.hatch.version]
source = "vcs"

[tool.hatch.version.raw-options]
local_scheme              = "no-local-version"
root                      = "../.."
search_parent_directories = true

[tool.hatch.version.raw-options.scm.git]
describe_command = [
  "git",
  "describe",
  "--dirty",
  "--tags",
  "--long",
  "--match",
  "coordinaxs-astro-v*",
]

[tool.hatch.build.hooks.vcs]
version-file = "src/coordinaxs/astro/_version.py"
version-file-template = """\
version: str = {version!r}
version_tuple: tuple[int, int, int] | tuple[int, int, int, str, str]
version_tuple = {version_tuple!r}
"""


[tool.uv.sources]
coordinax = { workspace = true }
