[project]
authors = [
  { name = "Coordinax Devs", email = "nstarman@users.noreply.github.com" },
  { name = "Nathaniel Starkman", email = "nstarman@users.noreply.github.com" },
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "Intended Audience :: Developers",
  "Operating System :: OS Independent",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Topic :: Scientific/Engineering",
  "Typing :: Typed",
]
dependencies = [
  "astropy>=7.0.0",
  "coordinax",
  "coordinaxs.api",
  "coordinaxs.astro",
  "jaxtyping>=0.3.3",
  "plum>=2.8.0; python_version < '3.14'",
  "plum>=2.9.0; python_version >= '3.14'",
  "unxt>=1.11.2",
]
description = "Astropy interoperability for coordinax"
dynamic = ["version"]
license = "MIT"
name = "coordinaxs.interop.astropy"
readme = "README.md"
requires-python = ">=3.11"

[project.entry-points."coordinaxs.interop"]
# Loading this entry point imports the module, which registers the astropy
# conversions and chart transitions as an import side effect.
astropy = "coordinaxs.interop.astropy"

[build-system]
build-backend = "hatchling.build"
requires      = ["hatch-vcs", "hatchling"]


[dependency-groups]
test = ["hypothesis>=6.148.7", "pytest>=9.0.2", "unxt-hypothesis>=1.10.1"]


[tool.hatch.build.targets.wheel]
packages = ["src/coordinaxs"]

[tool.hatch.version]
source = "vcs"

[tool.hatch.version.raw-options]
local_scheme              = "no-local-version"
root                      = "../.."
search_parent_directories = true

[tool.hatch.version.raw-options.scm.git]
describe_command = [
  "git",
  "describe",
  "--dirty",
  "--tags",
  "--long",
  "--match",
  "coordinaxs-interop-astropy-v*",
]

[tool.hatch.build.hooks.vcs]
version-file = "src/coordinaxs/interop/astropy/_version.py"
version-file-template = """\
version: str = {version!r}
version_tuple: tuple[int, int, int] | tuple[int, int, int, str, str]
version_tuple = {version_tuple!r}
"""


[tool.uv.sources]
coordinax          = { workspace = true }
"coordinaxs.api"   = { workspace = true }
"coordinaxs.astro" = { workspace = true }
